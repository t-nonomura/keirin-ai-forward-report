<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ガールズ3連単バックテスト</title>
<style>
:root{--bg:#f6f7f9;--panel:#fff;--ink:#172033;--muted:#657084;--line:#dfe3ea;--accent:#b91c1c;--ok:#047857;--bad:#b91c1c}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Meiryo,'Yu Gothic','Noto Sans JP',sans-serif}header{background:#fff;border-bottom:3px solid var(--accent)}.inner{max-width:1360px;margin:auto;padding:18px}h1{font-size:24px;margin:0 0 6px}h2{font-size:18px;margin:0}main{max-width:1500px;margin:auto;padding:16px 18px 44px}.meta,.note{color:var(--muted);font-size:13px;line-height:1.7}.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;margin:14px 0;padding:14px}.warnbox{background:#fff7ed;border-color:#fed7aa;color:#7c2d12}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.tab{border:1px solid var(--line);background:#fff;border-radius:7px;padding:8px 12px;font-weight:800;cursor:pointer}.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:10px}.card{border:1px solid var(--line);border-radius:8px;padding:10px;background:#fff}.card span{display:block;color:var(--muted);font-size:12px}.card strong{font-size:21px}.toolbar{display:grid;grid-template-columns:repeat(3,minmax(150px,1fr));gap:10px;margin:12px 0}.toolbar.one{grid-template-columns:minmax(220px,420px)}label{font-size:12px;color:var(--muted);font-weight:800;display:flex;flex-direction:column;gap:5px}select,input{font:inherit;border:1px solid #cfd5df;border-radius:6px;padding:8px;background:#fff}.table{overflow:auto;border:1px solid var(--line);border-radius:8px;background:#fff}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid var(--line);padding:8px 9px;white-space:nowrap;text-align:right;vertical-align:top}th{background:#f8fafc;color:#374151;position:sticky;top:0}th:first-child,td:first-child,td.tickets{text-align:left}.tickets{max-width:520px;white-space:normal;line-height:1.55}.hit{color:var(--ok);font-weight:800}.loss{color:var(--bad);font-weight:800}tr.hit-row td{background:#ecfdf5}tr.miss-row td{background:#fef2f2}tr.clickable{cursor:pointer}tr.clickable:hover td{background:#f8fafc}@media(max-width:560px){.cards,.toolbar,.toolbar.one{grid-template-columns:1fr}.inner,main{padding-left:12px;padding-right:12px}.card strong{font-size:18px}}
</style>
</head>
<body>
<header><div class="inner"><h1>ガールズ3連単バックテスト</h1><div class="meta" id="meta"></div></div></header>
<main>
<section class="panel warnbox">latest snapshot / final odds を含む研究用検証です。昇格判断では発走前証跡のフォワードテストと分けて扱います。</section>
<section class="panel"><h2>ケース切替</h2><div class="tabs" id="case-tabs"></div><div class="note" id="strategy"></div><div class="cards" id="summary-cards"></div></section>
<section class="panel"><h2>分解表示</h2><div class="tabs" id="breakdown-tabs"></div><div class="toolbar"><label>並び順<select id="sort-select"><option value="default">既定</option><option value="roi">ROI高い順</option><option value="race_count">R数多い順</option><option value="profit">損益高い順</option><option value="hit_rate">的中率高い順</option></select></label><label>最小R数<input id="min-races" type="number" min="1" value="1"></label></div><div class="table" id="breakdown-table"></div></section>
<section class="panel"><h2>日別レース明細</h2><div class="note">日別タブの行をクリックしても対象日を切り替えられます。</div><div class="toolbar one"><label>対象日<select id="detail-date"></select></label></div><div class="table" id="detail-table"></div></section>
<section class="panel"><h2>注記</h2><ul id="notes"></ul></section>
</main>

<script>
const DATA_URL='data/girls_trifecta_backtest.json?v=20260703-weighted-overlay-selector-v1';
let DATA = null;
const CASE_ORDER = ['hit30_ev_cover','v1_purchase','market_only_top6_equal','market_only_top1'];
const BREAKDOWN_TABS = [
  {id:'month',label:'月別'},{id:'week',label:'週別'},{id:'day',label:'日別'},
  {id:'time_band',label:'時間帯'},{id:'hour',label:'時台'},{id:'venue',label:'レース場'}
];
let caseId = '';
let breakdownId = 'month';
let detailDate = '';
function e(v){return String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function n(v){const x=Number(String(v==null?0:v).replace(/,/g,''));return Number.isFinite(x)?x:0;}
function yen(u){return Math.round(n(u)*100).toLocaleString('ja-JP')+'円';}
function pct(v){return (n(v)*100).toFixed(1)+'%';}
function dec(v,d=2){return n(v).toFixed(d);}
function active(el,on){el.classList.toggle('active',on);}
function currentCase(){return DATA.cases[caseId] || DATA.cases[Object.keys(DATA.cases)[0]];}
function renderMeta(){document.getElementById('meta').textContent=`期間: ${DATA.period} / 生成: ${DATA.generated_at}`;document.getElementById('strategy').textContent=DATA.strategy+' / odds: '+DATA.odds_basis;document.getElementById('notes').innerHTML=(DATA.notes||[]).map(x=>`<li>${e(x)}</li>`).join('');}
function renderCases(){const tabs=document.getElementById('case-tabs');const ids=CASE_ORDER.filter(id=>DATA.cases[id]).concat(Object.keys(DATA.cases).filter(id=>!CASE_ORDER.includes(id)));tabs.innerHTML=ids.map(id=>`<button class="tab ${id===caseId?'active':''}" data-case="${e(id)}">${e(DATA.cases[id].label)}</button>`).join('');tabs.querySelectorAll('button').forEach(btn=>btn.onclick=()=>{caseId=btn.dataset.case;renderAll();});}
function renderCards(){const s=currentCase().summary;const items=[['R数',s.race_count.toLocaleString('ja-JP')],['点数',s.ticket_count.toLocaleString('ja-JP')],['平均点数',dec(s.average_ticket_count,2)],['的中率',pct(s.hit_rate)],['投資額',yen(s.stake_units)],['払戻額',yen(s.return_units)],['回収率',pct(s.roi)],['損益',yen(s.profit_units)],['top3除外ROI',dec(s.roi_without_top3,3)],['top3払戻比率',pct(s.top3_return_share)]];document.getElementById('summary-cards').innerHTML=items.map(([k,v])=>`<div class="card"><span>${e(k)}</span><strong>${e(v)}</strong></div>`).join('');}
function renderBreakdownTabs(){const el=document.getElementById('breakdown-tabs');el.innerHTML=BREAKDOWN_TABS.map(t=>`<button class="tab ${t.id===breakdownId?'active':''}" data-tab="${t.id}">${t.label}</button>`).join('');el.querySelectorAll('button').forEach(btn=>btn.onclick=()=>{breakdownId=btn.dataset.tab;renderBreakdown();});}
function renderBreakdown(){const rows=[...(currentCase().breakdowns[breakdownId]||[])];const minR=n(document.getElementById('min-races').value)||1;const sort=document.getElementById('sort-select').value;let out=rows.filter(r=>n(r.race_count)>=minR);if(sort==='roi')out.sort((a,b)=>n(b.roi)-n(a.roi));else if(sort==='race_count')out.sort((a,b)=>n(b.race_count)-n(a.race_count));else if(sort==='profit')out.sort((a,b)=>n(b.profit_units)-n(a.profit_units));else if(sort==='hit_rate')out.sort((a,b)=>n(b.hit_rate)-n(a.hit_rate));const body=out.map(r=>`<tr class="${breakdownId==='day'?'clickable':''}" data-date="${e(r.key)}"><td>${e(r.label)}</td><td>${n(r.race_count).toLocaleString('ja-JP')}</td><td>${n(r.ticket_count).toLocaleString('ja-JP')}</td><td>${dec(r.average_ticket_count,2)}</td><td>${pct(r.hit_rate)}</td><td>${yen(r.stake_units)}</td><td>${yen(r.return_units)}</td><td>${pct(r.roi)}</td><td>${dec(r.roi_without_top3,3)}</td><td class="${n(r.profit_units)>=0?'hit':'loss'}">${yen(r.profit_units)}</td></tr>`).join('');document.getElementById('breakdown-table').innerHTML=`<table><thead><tr><th>区分</th><th>R数</th><th>点数</th><th>平均点数</th><th>的中率</th><th>投資額</th><th>払戻額</th><th>回収率</th><th>top3除外ROI</th><th>損益</th></tr></thead><tbody>${body}</tbody></table>`;if(breakdownId==='day')document.querySelectorAll('#breakdown-table tr[data-date]').forEach(tr=>tr.onclick=()=>{detailDate=tr.dataset.date;document.getElementById('detail-date').value=detailDate;renderDetails();});}
function renderDateSelect(){const dates=[...new Set(currentCase().race_details.map(r=>r.date))].sort();if(!dates.includes(detailDate))detailDate=dates[dates.length-1]||'';document.getElementById('detail-date').innerHTML=dates.map(d=>`<option value="${e(d)}">${e(d)}</option>`).join('');document.getElementById('detail-date').value=detailDate;document.getElementById('detail-date').onchange=e=>{detailDate=e.target.value;renderDetails();};}
function renderDetails(){const rows=currentCase().race_details.filter(r=>r.date===detailDate);const body=rows.map(r=>`<tr class="${r.hit?'hit-row':'miss-row'}"><td>${e(r.date)}</td><td>${e(r.venue)}</td><td>${e(r.race_number+'R')}</td><td class="tickets">${e(r.formation)}</td><td>${r.ticket_count}</td><td>${dec(r.combined_odds,2)}</td><td>${pct(r.estimated_hit_rate)}</td><td class="${r.hit?'hit':'loss'}">${r.hit?'的中':'不的中'}</td><td>${e(r.actual_ticket||'-')}</td><td>${r.actual_payout_units?yen(r.actual_payout_units):'-'}</td><td>${yen(r.invested_units)}</td><td>${yen(r.returned_units)}</td><td class="${n(r.profit_units)>=0?'hit':'loss'}">${yen(r.profit_units)}</td></tr>`).join('');document.getElementById('detail-table').innerHTML=`<table><thead><tr><th>日付</th><th>レース場</th><th>R</th><th>買い目</th><th>点数</th><th>合成オッズ</th><th>的中指標</th><th>状態</th><th>結果</th><th>配当</th><th>投資額</th><th>払戻額</th><th>損益</th></tr></thead><tbody>${body}</tbody></table>`;}
function renderAll(){renderMeta();renderCases();renderCards();renderBreakdownTabs();renderDateSelect();renderBreakdown();renderDetails();}
document.getElementById('sort-select').onchange=renderBreakdown;document.getElementById('min-races').oninput=renderBreakdown;async function init(){const res=await fetch(DATA_URL,{cache:'no-store'});DATA=await res.json();caseId=DATA.highlight_case||Object.keys(DATA.cases)[0];renderAll();}init().catch(err=>{document.getElementById('meta').textContent='load failed: '+err.message;});
</script>
</body>
</html>
