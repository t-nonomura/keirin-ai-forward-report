<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI&#x30E1;&#x30E2; 3&#x9023;&#x5358;&#x30D0;&#x30C3;&#x30AF;&#x30C6;&#x30B9;&#x30C8;</title>
<style>:root{--bg:#f6f7f9;--panel:#fff;--ink:#172033;--muted:#657084;--line:#dfe3ea;--accent:#b91c1c;--ok:#047857;--warn:#b45309;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Meiryo,'Yu Gothic','Noto Sans JP',sans-serif;}header{background:#fff;border-bottom:3px solid var(--accent)}.inner{max-width:1360px;margin:auto;padding:18px 18px}h1{font-size:24px;margin:0 0 6px}h2{font-size:18px;margin:0}.meta,.note{color:var(--muted);font-size:13px;line-height:1.7}main{max-width:1500px;margin:auto;padding:16px 18px 44px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;margin:14px 0;padding:14px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.tab{border:1px solid var(--line);background:#fff;border-radius:7px;padding:8px 12px;font-weight:800;cursor:pointer}.tab.active{background:var(--accent);border-color:var(--accent);color:white}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}.card{border:1px solid var(--line);border-radius:8px;padding:10px;background:#fff}.card span{display:block;color:var(--muted);font-size:12px}.card strong{font-size:21px}.toolbar{display:grid;grid-template-columns:repeat(3,minmax(150px,1fr));gap:10px;margin:12px 0}.toolbar.one{grid-template-columns:minmax(220px,420px)}label{font-size:12px;color:var(--muted);font-weight:800;display:flex;flex-direction:column;gap:5px}select,input{font:inherit;border:1px solid #cfd5df;border-radius:6px;padding:8px;background:#fff}.table{overflow:auto;border:1px solid var(--line);border-radius:8px;background:#fff}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid var(--line);padding:8px 9px;white-space:nowrap;text-align:right;vertical-align:top}th{background:#f8fafc;color:#374151;position:sticky;top:0}th:first-child,td:first-child,td.tickets{text-align:left}.tickets{max-width:460px;white-space:normal;line-height:1.5}.hit{color:var(--ok);font-weight:800}.loss{color:var(--accent);font-weight:800}.warnbox{background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:10px 12px;color:#7c2d12}.target-row td{background:#fff7ed;font-weight:800}tr.hit-row td{background:#ecfdf5}tr.miss-row td{background:#fef2f2}tr.hit-row:hover td{background:#d1fae5}tr.miss-row:hover td{background:#fee2e2}tr.clickable{cursor:pointer}tr.clickable:hover td{background:#f8fafc}@media(max-width:900px){.cards,.toolbar{grid-template-columns:1fr 1fr}}@media(max-width:560px){.cards,.toolbar,.toolbar.one{grid-template-columns:1fr}.inner,main{padding-left:12px;padding-right:12px}.card strong{font-size:18px}}</style>
</head>
<body>
<header><div class="inner"><h1>AI&#x30E1;&#x30E2; 3&#x9023;&#x5358;&#x30D0;&#x30C3;&#x30AF;&#x30C6;&#x30B9;&#x30C8;</h1><div class="meta" id="meta">&#x8AAD;&#x307F;&#x8FBC;&#x307F;&#x4E2D;...</div></div></header>
<main>
<section class="panel warnbox">latest snapshot / final odds &#x3092;&#x542B;&#x3080;&#x7814;&#x7A76;&#x7528;&#x691C;&#x8A3C;&#x3067;&#x3059;&#x3002;&#x6607;&#x683C;&#x5224;&#x65AD;&#x3067;&#x306F;&#x767A;&#x8D70;&#x524D;&#x8A3C;&#x8DE1;&#x306E;&#x30D5;&#x30A9;&#x30EF;&#x30FC;&#x30C9;&#x30C6;&#x30B9;&#x30C8;&#x3068;&#x5206;&#x3051;&#x3066;&#x6271;&#x3044;&#x307E;&#x3059;&#x3002;</section>
<section class="panel"><h2>&#x30B1;&#x30FC;&#x30B9;&#x5207;&#x66FF;</h2><div class="tabs" id="case-tabs"></div><div class="note" id="strategy"></div><div class="cards" id="summary-cards"></div></section>
<section class="panel"><h2>&#x5206;&#x89E3;&#x8868;&#x793A;</h2><div class="tabs" id="breakdown-tabs"></div><div class="toolbar"><label>&#x4E26;&#x3073;&#x9806;<select id="sort-select"><option value="default">&#x65E2;&#x5B9A;</option><option value="roi">ROI&#x9AD8;&#x3044;&#x9806;</option><option value="race_count">R&#x6570;&#x591A;&#x3044;&#x9806;</option><option value="profit">&#x640D;&#x76CA;&#x9AD8;&#x3044;&#x9806;</option><option value="hit_rate">&#x7684;&#x4E2D;&#x7387;&#x9AD8;&#x3044;&#x9806;</option></select></label><label>&#x6700;&#x5C0F;R&#x6570;<input id="min-races" type="number" min="1" value="1"></label></div><div class="table" id="breakdown-table"><div class="note">&#x8AAD;&#x307F;&#x8FBC;&#x307F;&#x4E2D;...</div></div></section>
<section class="panel"><h2>&#x65E5;&#x5225;&#x30EC;&#x30FC;&#x30B9;&#x660E;&#x7D30;</h2><div class="note">&#x65E5;&#x5225;&#x30BF;&#x30D6;&#x306E;&#x884C;&#x3092;&#x30AF;&#x30EA;&#x30C3;&#x30AF;&#x3057;&#x3066;&#x3082;&#x5BFE;&#x8C61;&#x65E5;&#x3092;&#x5207;&#x308A;&#x66FF;&#x3048;&#x3089;&#x308C;&#x307E;&#x3059;&#x3002;</div><div class="toolbar one"><label>&#x5BFE;&#x8C61;&#x65E5;<select id="detail-date"></select></label></div><div class="table" id="detail-table"><div class="note">&#x8AAD;&#x307F;&#x8FBC;&#x307F;&#x4E2D;...</div></div></section>
<section class="panel"><h2>&#x6CE8;&#x8A18;</h2><ul id="notes"></ul></section>
</main>
<script>
const DATA_URL='data/ai_memo_formation_400m.json?v=20260610-backtest-combined-odds';
const CASE_ORDER=['offensive_no_500_cap','stable_cap_500','stable_cap_300','stable_cap_200'];
const BREAKDOWN_TABS=[
  {id:'month',label:'\u6708\u5225'},
  {id:'week',label:'\u9031\u5225'},
  {id:'day',label:'\u65e5\u5225'},
  {id:'time_band',label:'\u6642\u9593\u5e2f'},
  {id:'hour',label:'\u6642\u53f0'},
  {id:'venue',label:'\u30ec\u30fc\u30b9\u5834'}
];
let DATA=null;let caseId='stable_cap_500';let breakdownId='month';let detailDate='';
function e(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function n(v){const x=Number(String(v==null?0:v).replace(/,/g,''));return Number.isFinite(x)?x:0;}
function yen(u){return Math.round(n(u)*100).toLocaleString('ja-JP')+'\u5186';}
function pct(v){return (n(v)*100).toFixed(1)+'%';}
function resultLabel(hit){return hit?'\u7684\u4e2d':'\u4e0d\u7684\u4e2d';}
function formatTickets(src){const tickets=[];const text=Array.isArray(src)?src.join('|'):String(src||'');const re=/\b(\d+)\s*[-=]\s*(\d+)\s*[-=]\s*(\d+)\b/g;let m;while((m=re.exec(text))!==null){const t=[m[1],m[2],m[3]];if(new Set(t).size===3)tickets.push(t);}if(!tickets.length)return e(text||'-');const groups=new Map();for(const t of tickets){const key=t[0]+'-'+t[1];if(!groups.has(key))groups.set(key,new Set());groups.get(key).add(t[2]);}const labels=[...groups.entries()].map(function(pair){const thirds=[...pair[1]].sort(function(a,b){return Number(a)-Number(b);}).join('');return pair[0]+'-'+thirds;});return e(labels.join(' / '));}
function cards(s){return `<div class="card"><span>R</span><strong>${s.race_count}</strong></div><div class="card"><span>\u70b9\u6570</span><strong>${s.ticket_count}</strong></div><div class="card"><span>\u5e73\u5747\u70b9</span><strong>${n(s.average_ticket_count).toFixed(2)}</strong></div><div class="card"><span>\u7684\u4e2d\u7387</span><strong>${pct(s.hit_rate)}</strong></div><div class="card"><span>\u8cfc\u5165\u984d</span><strong>${yen(s.stake_units)}</strong></div><div class="card"><span>\u6255\u623b\u984d</span><strong>${yen(s.return_units)}</strong></div><div class="card"><span>ROI</span><strong>${pct(s.roi)}</strong></div><div class="card"><span>\u5408\u6210\u8cb7\u3044ROI</span><strong>${pct(s.dutch_roi)}</strong></div><div class="card"><span>\u5e73\u5747\u5408\u6210O</span><strong>${n(s.average_combined_odds).toFixed(2)}</strong></div><div class="card"><span>\u4e0a\u4f4d3\u672c\u9664\u5916ROI</span><strong>${pct(s.roi_without_top3)}</strong></div>`;}
function populateTabs(){document.getElementById('case-tabs').innerHTML=CASE_ORDER.map(function(id){const c=DATA.cases[id];return `<button class="tab ${id===caseId?'active':''}" data-case="${e(id)}">${e(c.label)}</button>`;}).join('');document.getElementById('breakdown-tabs').innerHTML=BREAKDOWN_TABS.map(function(t){return `<button class="tab ${t.id===breakdownId?'active':''}" data-breakdown="${e(t.id)}">${e(t.label)}</button>`;}).join('');}
function renderSummary(){const c=DATA.cases[caseId];document.getElementById('summary-cards').innerHTML=cards(c.summary);document.getElementById('strategy').textContent=DATA.strategy;}
function sortedRows(){const minR=n(document.getElementById('min-races').value)||1;let rows=[...(DATA.cases[caseId].breakdowns[breakdownId]||[])].filter(function(r){return n(r.race_count)>=minR;});const sort=document.getElementById('sort-select').value;if(sort==='roi')rows.sort(function(a,b){return n(b.roi)-n(a.roi)||n(b.race_count)-n(a.race_count);});else if(sort==='race_count')rows.sort(function(a,b){return n(b.race_count)-n(a.race_count)||String(a.label).localeCompare(String(b.label),'ja');});else if(sort==='profit')rows.sort(function(a,b){return n(b.profit_units)-n(a.profit_units);});else if(sort==='hit_rate')rows.sort(function(a,b){return n(b.hit_rate)-n(a.hit_rate)||n(b.race_count)-n(a.race_count);});return rows;}
function renderBreakdown(){const rows=sortedRows();const body=rows.map(function(r){const cls=n(r.profit_units)>=0?'hit':'loss';const rowAttr=breakdownId==='day'?` class="clickable" data-date="${e(r.key)}"`:'';return `<tr${rowAttr}><td>${e(r.label||r.key)}</td><td>${r.race_count}</td><td>${r.ticket_count}</td><td>${n(r.average_ticket_count).toFixed(2)}</td><td>${pct(r.hit_rate)}</td><td>${yen(r.stake_units)}</td><td>${yen(r.return_units)}</td><td class="${cls}">${yen(r.profit_units)}</td><td>${pct(r.roi)}</td><td>${pct(r.dutch_roi)}</td><td>${n(r.average_combined_odds).toFixed(2)}</td><td>${pct(r.roi_without_top3)}</td><td>${pct(r.roi_without_top5)}</td></tr>`;}).join('');document.getElementById('breakdown-table').innerHTML=body?`<table><thead><tr><th>\u533a\u5206</th><th>R</th><th>\u70b9</th><th>\u5e73\u5747\u70b9</th><th>\u7684\u4e2d\u7387</th><th>\u8cfc\u5165\u984d</th><th>\u6255\u623b\u984d</th><th>\u640d\u76ca</th><th>ROI</th><th>\u5408\u6210\u8cb7\u3044ROI</th><th>\u5e73\u5747\u5408\u6210O</th><th>\u4e0a\u4f4d3\u672c\u9664\u5916ROI</th><th>\u4e0a\u4f4d5\u672c\u9664\u5916ROI</th></tr></thead><tbody>${body}</tbody></table>`:'<div class="note">\u8a72\u5f53\u3059\u308b\u30c7\u30fc\u30bf\u304c\u3042\u308a\u307e\u305b\u3093\u3002</div>';}
function dailyRows(){return DATA.cases[caseId].breakdowns.day||[];}
function details(){return DATA.cases[caseId].race_details||[];}
function populateDetailDates(){const current=detailDate;const days=dailyRows();if(!days.length){document.getElementById('detail-date').innerHTML='';detailDate='';return;}if(!days.some(function(d){return d.key===current;})){detailDate=days[0].key;}document.getElementById('detail-date').innerHTML=days.map(function(d){const label=`${d.key} (${d.race_count}R / ROI ${pct(d.roi)} / ${yen(d.profit_units)})`;return `<option value="${e(d.key)}" ${d.key===detailDate?'selected':''}>${e(label)}</option>`;}).join('');}
function renderDetails(){populateDetailDates();const rows=details().filter(function(r){return r.date===detailDate;});const body=rows.map(function(r){const cls=r.hit?'hit':'loss';const rowCls=r.hit?'hit-row':'miss-row';const co=n(r.combined_odds);return `<tr class="${rowCls}"><td>${e(r.scheduled_start_time)}</td><td>${e(r.venue)}</td><td>${e(r.race_number)}R</td><td>${e(r.title||r.race_stage)}</td><td class="tickets">${formatTickets(r.selected_tickets||r.selected_tickets_text)}</td><td>${r.ticket_count}</td><td>${n(r.min_ticket_odds).toFixed(1)}\u301c${n(r.max_ticket_odds).toFixed(1)}</td><td>${co?co.toFixed(2):'-'}</td><td>${e(r.actual_ticket||'-')}</td><td>${r.actual_payout_units?yen(r.actual_payout_units):'-'}</td><td class="${cls}">${resultLabel(r.hit)}</td><td>${yen(r.stake_units)}</td><td>${yen(r.return_units)}</td><td class="${cls}">${yen(r.profit_units)}</td><td class="${cls}">${yen(r.dutch_profit_units)}</td><td>${e(r.scenario_type)}</td><td>${e(r.risk_level)}</td></tr>`;}).join('');document.getElementById('detail-table').innerHTML=body?`<table><thead><tr><th>\u767a\u8d70</th><th>\u5834</th><th>R</th><th>\u30ec\u30fc\u30b9</th><th>\u4e88\u60f3\u8cb7\u3044\u76ee</th><th>\u70b9</th><th>\u30aa\u30c3\u30ba</th><th>\u5408\u6210O</th><th>\u5b9f3\u9023\u5358</th><th>\u6255\u623b</th><th>\u7d50\u679c</th><th>\u8cfc\u5165</th><th>\u56de\u53ce</th><th>\u640d\u76ca</th><th>\u5408\u6210\u640d\u76ca</th><th>scenario</th><th>risk</th></tr></thead><tbody>${body}</tbody></table>`:'<div class="note">\u3053\u306e\u65e5\u306e\u660e\u7d30\u306f\u3042\u308a\u307e\u305b\u3093\u3002</div>';}
function render(){populateTabs();renderSummary();renderBreakdown();renderDetails();}
async function init(){const res=await fetch(DATA_URL,{cache:'no-store'});DATA=await res.json();document.getElementById('meta').textContent='\u671f\u9593: '+DATA.period+' / \u751f\u6210: '+DATA.generated_at;render();document.getElementById('case-tabs').addEventListener('click',function(ev){const b=ev.target.closest('button[data-case]');if(!b)return;caseId=b.dataset.case;detailDate='';render();});document.getElementById('breakdown-tabs').addEventListener('click',function(ev){const b=ev.target.closest('button[data-breakdown]');if(!b)return;breakdownId=b.dataset.breakdown;render();});document.getElementById('breakdown-table').addEventListener('click',function(ev){const row=ev.target.closest('tr[data-date]');if(!row)return;detailDate=row.dataset.date;document.getElementById('detail-date').value=detailDate;renderDetails();});document.getElementById('detail-date').addEventListener('change',function(ev){detailDate=ev.target.value;renderDetails();});document.getElementById('sort-select').addEventListener('change',renderBreakdown);document.getElementById('min-races').addEventListener('input',renderBreakdown);document.getElementById('notes').innerHTML=(DATA.notes||[]).map(function(x){return `<li>${e(x)}</li>`;}).join('');}
init().catch(function(err){document.getElementById('breakdown-table').innerHTML='<div class="note">\u30c7\u30fc\u30bf\u306e\u8aad\u307f\u8fbc\u307f\u306b\u5931\u6557\u3057\u307e\u3057\u305f: '+e(err.message)+'</div>';});
</script>
</body>
</html>
