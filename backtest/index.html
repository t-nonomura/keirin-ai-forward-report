<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI&#x30E1;&#x30E2; 3&#x9023;&#x5358;&#x30D0;&#x30C3;&#x30AF;&#x30C6;&#x30B9;&#x30C8;</title>
<style>:root{--bg:#f6f7f9;--panel:#fff;--ink:#172033;--muted:#657084;--line:#dfe3ea;--accent:#b91c1c;--ok:#047857;--warn:#b45309;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Meiryo,'Yu Gothic','Noto Sans JP',sans-serif;}header{background:#fff;border-bottom:3px solid var(--accent)}.inner{max-width:1360px;margin:auto;padding:18px 18px}h1{font-size:24px;margin:0 0 6px}h2{font-size:18px;margin:0}.meta,.note{color:var(--muted);font-size:13px;line-height:1.7}main{max-width:1360px;margin:auto;padding:16px 18px 44px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;margin:14px 0;padding:14px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.tab{border:1px solid var(--line);background:#fff;border-radius:7px;padding:8px 12px;font-weight:800;cursor:pointer}.tab.active{background:var(--accent);border-color:var(--accent);color:white}.cards{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px}.card{border:1px solid var(--line);border-radius:8px;padding:10px;background:#fff}.card span{display:block;color:var(--muted);font-size:12px}.card strong{font-size:22px}.toolbar{display:grid;grid-template-columns:repeat(4,minmax(140px,1fr));gap:10px;margin:12px 0}label{font-size:12px;color:var(--muted);font-weight:800;display:flex;flex-direction:column;gap:5px}select,input{font:inherit;border:1px solid #cfd5df;border-radius:6px;padding:8px;background:#fff}.table{overflow:auto;border:1px solid var(--line);border-radius:8px;background:#fff}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid var(--line);padding:8px 9px;white-space:nowrap;text-align:right}th{background:#f8fafc;color:#374151;position:sticky;top:0}th:first-child,td:first-child,th:nth-child(2),td:nth-child(2),th:nth-child(5),td:nth-child(5),th:nth-child(9),td:nth-child(9){text-align:left}.scope{font-weight:800}.target{color:var(--accent)}.ref{color:var(--muted)}.hit{color:var(--ok);font-weight:800}.miss{color:var(--accent);font-weight:800}.pending{color:var(--warn);font-weight:800}.pill{display:inline-block;padding:3px 8px;border-radius:999px;border:1px solid var(--line);background:#fff;font-weight:800}.warnbox{background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:10px 12px;color:#7c2d12}.tickets{max-width:360px;white-space:normal;text-align:left;line-height:1.5}tr.target-row td{background:#fff7ed;font-weight:800}@media(max-width:900px){.cards,.toolbar{grid-template-columns:1fr 1fr}}@media(max-width:560px){.cards,.toolbar{grid-template-columns:1fr}.inner,main{padding-left:12px;padding-right:12px}.card strong{font-size:19px}}</style>
</head>
<body>
<header><div class="inner"><h1>AI&#x30E1;&#x30E2; 3&#x9023;&#x5358;&#x30D0;&#x30C3;&#x30AF;&#x30C6;&#x30B9;&#x30C8;</h1><div class="meta" id="meta">&#x8AAD;&#x307F;&#x8FBC;&#x307F;&#x4E2D;...</div></div></header>
<main>
<section class="panel warnbox">latest snapshot / final odds &#x3092;&#x542B;&#x3080;&#x7814;&#x7A76;&#x7528;&#x691C;&#x8A3C;&#x3067;&#x3059;&#x3002;&#x6607;&#x683C;&#x5224;&#x65AD;&#x3067;&#x306F;&#x767A;&#x8D70;&#x524D;&#x8A3C;&#x8DE1;&#x306E;&#x30D5;&#x30A9;&#x30EF;&#x30FC;&#x30C9;&#x30C6;&#x30B9;&#x30C8;&#x3068;&#x5206;&#x3051;&#x3066;&#x6271;&#x3044;&#x307E;&#x3059;&#x3002;</section>
<section class="panel"><h2>500&#x500D;&#x8D85;&#x9664;&#x5916;&#x30B1;&#x30FC;&#x30B9;</h2><div class="note" id="strategy"></div><div class="table" id="case-table"><div class="note">&#x8AAD;&#x307F;&#x8FBC;&#x307F;&#x4E2D;...</div></div></section>
<section class="panel"><h2 id="month-title">&#x6708;&#x5225;</h2><div class="table" id="month-table"></div></section>
<section class="panel"><h2>&#x6CE8;&#x8A18;</h2><ul id="notes"></ul></section>
</main>
<script>
const DATA_URL='data/ai_memo_formation_400m.json?v=20260610-encoding-fix2';
function e(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function n(v){const x=Number(String(v==null?0:v).replace(/,/g,''));return Number.isFinite(x)?x:0;}
function yen(u){return Math.round(n(u)*100).toLocaleString('ja-JP')+'\u5186';}
function pct(v){return (n(v)*100).toFixed(1)+'%';}
async function init(){const res=await fetch(DATA_URL,{cache:'no-store'});const DATA=await res.json();document.getElementById('meta').textContent='\u671f\u9593: '+DATA.period+' / \u751f\u6210: '+DATA.generated_at;document.getElementById('strategy').textContent=DATA.strategy;const order=['offensive_no_500_cap','stable_cap_500','stable_cap_300','stable_cap_200'];const body=order.map(function(id){const c=DATA.cases[id],s=c.summary;const cls=id===DATA.highlight_case?'target-row':'';return `<tr class="${cls}"><td>${e(c.label)}</td><td>${s.race_count}</td><td>${s.ticket_count}</td><td>${n(s.average_ticket_count).toFixed(2)}</td><td>${pct(s.hit_rate)}</td><td>${yen(s.stake_units)}</td><td>${yen(s.return_units)}</td><td>${pct(s.roi)}</td><td>${pct(s.roi_without_top3)}</td><td>${pct(s.roi_without_top5)}</td></tr>`;}).join('');document.getElementById('case-table').innerHTML=`<table><thead><tr><th>\u30b1\u30fc\u30b9</th><th>R</th><th>\u70b9</th><th>\u5e73\u5747\u70b9</th><th>\u7684\u4e2d\u7387</th><th>\u8cfc\u5165\u984d</th><th>\u6255\u623b\u984d</th><th>ROI</th><th>\u4e0a\u4f4d3\u672c\u9664\u5916ROI</th><th>\u4e0a\u4f4d5\u672c\u9664\u5916ROI</th></tr></thead><tbody>${body}</tbody></table>`;const h=DATA.cases[DATA.highlight_case];document.getElementById('month-title').textContent='\u6708\u5225: '+h.label;const mb=h.summary.months.map(function(m){return `<tr><td>${e(m.month)}</td><td>${m.race_count}</td><td>${m.ticket_count}</td><td>${pct(m.hit_rate)}</td><td>${pct(m.roi)}</td><td>${yen(m.profit_units)}</td></tr>`;}).join('');document.getElementById('month-table').innerHTML=`<table><thead><tr><th>\u6708</th><th>R</th><th>\u70b9</th><th>\u7684\u4e2d\u7387</th><th>ROI</th><th>\u640d\u76ca</th></tr></thead><tbody>${mb}</tbody></table>`;document.getElementById('notes').innerHTML=(DATA.notes||[]).map(function(x){return `<li>${e(x)}</li>`;}).join('');}
init().catch(function(err){document.getElementById('case-table').innerHTML='<div class="note">\u30c7\u30fc\u30bf\u306e\u8aad\u307f\u8fbc\u307f\u306b\u5931\u6557\u3057\u307e\u3057\u305f: '+e(err.message)+'</div>';});
</script>
</body>
</html>
