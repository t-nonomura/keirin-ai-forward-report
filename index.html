<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI&#x30E1;&#x30E2; 3&#x9023;&#x5358;&#x30D5;&#x30A9;&#x30EF;&#x30FC;&#x30C9;&#x30C6;&#x30B9;&#x30C8;</title>
<style>:root{--bg:#f6f7f9;--panel:#fff;--ink:#172033;--muted:#657084;--line:#dfe3ea;--accent:#b91c1c;--ok:#047857;--warn:#b45309;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Meiryo,'Yu Gothic','Noto Sans JP',sans-serif;}header{background:#fff;border-bottom:3px solid var(--accent)}.inner{max-width:1360px;margin:auto;padding:18px 18px}h1{font-size:24px;margin:0 0 6px}h2{font-size:18px;margin:0}.meta,.note{color:var(--muted);font-size:13px;line-height:1.7}main{max-width:1360px;margin:auto;padding:16px 18px 44px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;margin:14px 0;padding:14px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.tab{border:1px solid var(--line);background:#fff;border-radius:7px;padding:8px 12px;font-weight:800;cursor:pointer}.tab.active{background:var(--accent);border-color:var(--accent);color:white}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}.card{border:1px solid var(--line);border-radius:8px;padding:10px;background:#fff}.card span{display:block;color:var(--muted);font-size:12px}.card strong{font-size:22px}.toolbar{display:grid;grid-template-columns:repeat(4,minmax(140px,1fr));gap:10px;margin:12px 0}label{font-size:12px;color:var(--muted);font-weight:800;display:flex;flex-direction:column;gap:5px}select,input{font:inherit;border:1px solid #cfd5df;border-radius:6px;padding:8px;background:#fff}.table{overflow:auto;border:1px solid var(--line);border-radius:8px;background:#fff}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid var(--line);padding:8px 9px;white-space:nowrap;text-align:right}th{background:#f8fafc;color:#374151;position:sticky;top:0}th:first-child,td:first-child,th:nth-child(2),td:nth-child(2),th:nth-child(5),td:nth-child(5),th:nth-child(9),td:nth-child(9){text-align:left}.scope{font-weight:800}.target{color:var(--accent)}.ref{color:var(--muted)}.hit{color:var(--ok);font-weight:800}.miss{color:var(--accent);font-weight:800}.pending{color:var(--warn);font-weight:800}.pill{display:inline-block;padding:3px 8px;border-radius:999px;border:1px solid var(--line);background:#fff;font-weight:800}.warnbox{background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:10px 12px;color:#7c2d12}.tickets{min-width:96px;max-width:none;white-space:nowrap;text-align:left;line-height:1.5}tr.target-row td{background:#fff7ed;font-weight:800}tr.hit-row td{background:#ecfdf5}tr.miss-row td{background:#fef2f2}tr.hit-row:hover td{background:#d1fae5}tr.miss-row:hover td{background:#fee2e2}@media(max-width:900px){.cards,.toolbar{grid-template-columns:1fr 1fr}}@media(max-width:560px){.cards,.toolbar{grid-template-columns:1fr}.inner,main{padding-left:12px;padding-right:12px}.card strong{font-size:19px}}</style>
</head>
<body>
<header><div class="inner"><h1>AI&#x30E1;&#x30E2; 3&#x9023;&#x5358;&#x30D5;&#x30A9;&#x30EF;&#x30FC;&#x30C9;&#x30C6;&#x30B9;&#x30C8;</h1><div class="meta" id="meta">&#x8AAD;&#x307F;&#x8FBC;&#x307F;&#x4E2D;...</div></div></header>
<main>
<section class="panel warnbox">&#x7D42;&#x4E86;&#x6E08;&#x307F;&#x30EC;&#x30FC;&#x30B9;&#x3082;&#x53C2;&#x8003;&#x8868;&#x793A;&#x3057;&#x3066;&#x3044;&#x307E;&#x3059;&#x3002;&#x6295;&#x7968;&#x8A3C;&#x8DE1;&#x3068;&#x3057;&#x3066;&#x53B3;&#x5BC6;&#x306B;&#x6271;&#x3046;&#x306E;&#x306F;&#x300C;&#x691C;&#x8A3C;&#x5BFE;&#x8C61;&#x300D;&#x306E;&#x884C;&#x3060;&#x3051;&#x3067;&#x3059;&#x3002;</section>
<section class="panel"><h2>&#x30D1;&#x30BF;&#x30FC;&#x30F3;&#x5207;&#x66FF;</h2><div class="tabs" id="pattern-tabs"></div><div class="note" id="pattern-note"></div><div class="cards" id="summary-cards"></div></section>
<section class="panel"><h2>&#x30EC;&#x30FC;&#x30B9;&#x4E00;&#x89A7;</h2><div class="toolbar"><label>&#x7BC4;&#x56F2;<select id="scope-filter"><option value="all">&#x5168;R</option><option value="forward_test">&#x691C;&#x8A3C;&#x5BFE;&#x8C61;</option><option value="reference">&#x53C2;&#x8003;</option></select></label><label>&#x5834;<select id="venue-filter"><option value="all">&#x5168;&#x5834;</option></select></label><label>&#x7D50;&#x679C;<select id="status-filter"><option value="all">&#x5168;&#x3066;</option><option value="pending">&#x672A;&#x78BA;&#x5B9A;</option><option value="hit">&#x7684;&#x4E2D;</option><option value="miss">&#x4E0D;&#x7684;&#x4E2D;</option><option value="no_selection">&#x8CB7;&#x3044;&#x76EE;&#x306A;&#x3057;</option></select></label><label>&#x4E26;&#x3073;&#x9806;<select id="sort-select"><option value="time">&#x767A;&#x8D70;&#x9806;</option><option value="target">&#x691C;&#x8A3C;&#x5BFE;&#x8C61;&#x512A;&#x5148;</option><option value="odds">&#x6700;&#x9AD8;&#x30AA;&#x30C3;&#x30BA;&#x9806;</option></select></label></div><div class="table" id="race-table"><div class="note">&#x8AAD;&#x307F;&#x8FBC;&#x307F;&#x4E2D;...</div></div></section>
</main>
<script>
const DATA_URL='data/ai_memo_forward/latest.json?v=20260611-ai-memo-forward';
let DATA=null;let pattern='stable_cap_500';
function e(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function n(v){const x=Number(String(v==null?0:v).replace(/,/g,''));return Number.isFinite(x)?x:0;}
function yen(u){return Math.round(n(u)*100).toLocaleString('ja-JP')+'\u5186';}
function pct(v){return (n(v)*100).toFixed(1)+'%';}
function statusLabel(s){return {hit:'\u7684\u4e2d',miss:'\u4e0d\u7684\u4e2d',pending:'\u672a\u78ba\u5b9a',reference:'\u53c2\u8003',no_selection:'\u8cb7\u3044\u76ee\u306a\u3057'}[s]||s;}
function formatTickets(src){const tickets=[];const text=Array.isArray(src)?src.join('|'):String(src||'');const re=/\b(\d+)\s*[-=]\s*(\d+)\s*[-=]\s*(\d+)\b/g;let m;while((m=re.exec(text))!==null){const t=[m[1],m[2],m[3]];if(new Set(t).size===3)tickets.push(t);}if(!tickets.length)return e(text||'-');const groups=new Map();for(const t of tickets){const key=t[0]+'-'+t[1];if(!groups.has(key))groups.set(key,new Set());groups.get(key).add(t[2]);}const labels=[...groups.entries()].map(function(pair){const thirds=[...pair[1]].sort(function(a,b){return Number(a)-Number(b);}).join('');return pair[0]+'-'+thirds;});return labels.map(e).join('<br>');}
function summaryCards(s){return `<div class="card"><span>\u691c\u8a3c\u5bfe\u8c61R</span><strong>${s.forward_test_race_count}</strong></div><div class="card"><span>\u78ba\u5b9aR</span><strong>${s.settled_count}</strong></div><div class="card"><span>\u7684\u4e2d\u7387</span><strong>${pct(s.hit_rate)}</strong></div><div class="card"><span>\u70b9\u6570</span><strong>${s.ticket_count}</strong></div><div class="card"><span>\u8cfc\u5165\u984d</span><strong>${yen(s.invested_units)}</strong></div><div class="card"><span>\u6255\u623b\u984d</span><strong>${yen(s.returned_units)}</strong></div><div class="card"><span>ROI</span><strong>${pct(s.roi)}</strong></div><div class="card"><span>\u5408\u6210\u8cb7\u3044ROI</span><strong>${pct(s.dutch_roi)}</strong></div><div class="card"><span>\u5e73\u5747\u5408\u6210O</span><strong>${n(s.average_combined_odds).toFixed(2)}</strong></div>`;}
function rows(){return DATA.rows.filter(function(r){return r.pattern_id===pattern;});}
function populate(){document.getElementById('meta').textContent='\u5bfe\u8c61\u65e5: '+DATA.target_date+' / \u751f\u6210: '+DATA.generated_at;document.querySelector('#scope-filter option[value="all"]').textContent='\u5168'+(DATA.raw_race_count||rows().length)+'R';document.getElementById('pattern-tabs').innerHTML=Object.entries(DATA.patterns).map(function(pair){const id=pair[0],p=pair[1];return `<button class="tab ${id===pattern?'active':''}" data-id="${e(id)}">${e(p.label)}</button>`;}).join('');document.getElementById('pattern-note').textContent=DATA.patterns[pattern].description;document.getElementById('summary-cards').innerHTML=summaryCards(DATA.patterns[pattern].summary);const venues=[...new Set(DATA.rows.map(function(r){return r.venue;}).filter(Boolean))].sort(function(a,b){return a.localeCompare(b,'ja');});document.getElementById('venue-filter').innerHTML='<option value="all">\u5168\u5834</option>'+venues.map(function(v){return `<option value="${e(v)}">${e(v)}</option>`;}).join('');}
function filtered(){const scope=document.getElementById('scope-filter').value,venue=document.getElementById('venue-filter').value,status=document.getElementById('status-filter').value,sort=document.getElementById('sort-select').value;let out=rows().filter(function(r){return (scope==='all'||r.selection_scope===scope)&&(venue==='all'||r.venue===venue)&&(status==='all'||r.status===status);});out.sort(function(a,b){if(sort==='target'){const d=(b.forward_test_target?1:0)-(a.forward_test_target?1:0);if(d)return d;}if(sort==='odds')return n(b.odds_max)-n(a.odds_max);return String(a.scheduled_start_time).localeCompare(String(b.scheduled_start_time))||String(a.venue).localeCompare(String(b.venue),'ja')||n(a.race_number)-n(b.race_number);});return out;}
function render(){const body=filtered().map(function(r){const settled=r.status==='hit'||r.status==='miss';const rowCls=r.status==='hit'?'hit-row':(r.status==='miss'?'miss-row':'');const stake=settled?n(r.ticket_count):0;const ret=settled?n(r.returned_units):0;const profit=ret-stake;const co=n(r.combined_odds);const dutchProfit=settled?n(r.dutch_profit_units):0;return `<tr class="${rowCls}"><td>${e(r.scheduled_start_time)}</td><td>${e(r.venue)}</td><td>${e(r.race_number)}R</td><td>${e(r.class_band)}</td><td>${e(r.title)}</td><td>${e(r.race_stage)}</td><td>${e(r.bank)}m</td><td><span class="scope ${r.forward_test_target?'target':'ref'}">${r.forward_test_target?'\u691c\u8a3c\u5bfe\u8c61':'\u53c2\u8003'}</span></td><td class="tickets">${formatTickets(r.selected_tickets)}</td><td>${r.ticket_count}</td><td>${r.odds_min||'-'}\u301c${r.odds_max||'-'}</td><td>${co?co.toFixed(2):'-'}</td><td>${n(r.estimated_hit_index).toFixed(3)}</td><td class="${e(r.status)}">${statusLabel(r.status)}</td><td>${e(r.actual_ticket||'-')}</td><td>${r.actual_payout_units?yen(r.actual_payout_units):'-'}</td><td>${settled?yen(stake):'-'}</td><td>${settled?yen(ret):'-'}</td><td>${settled?yen(profit):'-'}</td><td>${settled?yen(dutchProfit):'-'}</td></tr>`;}).join('');document.getElementById('race-table').innerHTML=body?`<table><thead><tr><th>\u767a\u8d70</th><th>\u5834</th><th>R</th><th>\u7d1a</th><th>\u30ec\u30fc\u30b9</th><th>stage</th><th>bank</th><th>\u7bc4\u56f2</th><th>\u8cb7\u3044\u76ee</th><th>\u70b9</th><th>\u30aa\u30c3\u30ba</th><th>\u5408\u6210O</th><th>\u6307\u6570</th><th>\u7d50\u679c</th><th>\u5b9f\u7740</th><th>\u6255\u623b</th><th>\u8cfc\u5165</th><th>\u56de\u53ce</th><th>\u640d\u76ca</th><th>\u5408\u6210\u640d\u76ca</th></tr></thead><tbody>${body}</tbody></table>`:'<div class="note">\u8a72\u5f53\u3059\u308b\u30ec\u30fc\u30b9\u304c\u3042\u308a\u307e\u305b\u3093\u3002</div>';}
async function init(){const res=await fetch(DATA_URL,{cache:'no-store'});DATA=await res.json();populate();render();document.getElementById('pattern-tabs').addEventListener('click',function(ev){const b=ev.target.closest('button[data-id]');if(!b)return;pattern=b.dataset.id;populate();render();});['scope-filter','venue-filter','status-filter','sort-select'].forEach(function(id){document.getElementById(id).addEventListener('change',render);});}
init().catch(function(err){document.getElementById('race-table').innerHTML='<div class="note">\u30c7\u30fc\u30bf\u306e\u8aad\u307f\u8fbc\u307f\u306b\u5931\u6557\u3057\u307e\u3057\u305f: '+e(err.message)+'</div>';});
</script>
</body>
</html>
