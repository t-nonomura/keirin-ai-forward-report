<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AIメモ 3連単フォワードテスト</title>
<style>
:root{--bg:#f6f7f9;--panel:#fff;--ink:#172033;--muted:#657084;--line:#dfe3ea;--accent:#b91c1c;--ok:#047857;--warn:#b45309;--soft:#f8fafc}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Meiryo,'Yu Gothic','Noto Sans JP',sans-serif}
header{background:#fff;border-bottom:3px solid var(--accent)}
.inner{max-width:1360px;margin:auto;padding:18px}
h1{font-size:24px;margin:0 0 6px;letter-spacing:0}
h2{font-size:18px;margin:0}
main{max-width:1360px;margin:auto;padding:16px 18px 44px}
.meta,.note{color:var(--muted);font-size:13px;line-height:1.7}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;margin:14px 0;padding:14px}
.warnbox{background:#fff7ed;border-color:#fed7aa;color:#7c2d12}
.nav-grid{display:grid;grid-template-columns:minmax(220px,1.1fr) auto auto minmax(180px,.8fr);gap:10px;align-items:end;margin-top:12px}
label{font-size:12px;color:var(--muted);font-weight:800;display:flex;flex-direction:column;gap:5px}
select,input,button{font:inherit}
select,input{border:1px solid #cfd5df;border-radius:6px;padding:8px;background:#fff;min-height:38px}
button{border:1px solid var(--line);background:#fff;border-radius:7px;padding:8px 12px;font-weight:800;cursor:pointer;min-height:38px}
button:disabled{cursor:not-allowed;color:#9ca3af;background:#f3f4f6}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.tab.active{background:var(--accent);border-color:var(--accent);color:white}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.card{border:1px solid var(--line);border-radius:8px;padding:10px;background:#fff}
.card span{display:block;color:var(--muted);font-size:12px}
.card strong{font-size:22px;letter-spacing:0}
.toolbar{display:grid;grid-template-columns:repeat(4,minmax(140px,1fr));gap:10px;margin:12px 0}
.table{overflow:auto;border:1px solid var(--line);border-radius:8px;background:#fff}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border-bottom:1px solid var(--line);padding:8px 9px;white-space:nowrap;text-align:right}
th{background:var(--soft);color:#374151;position:sticky;top:0}
th:first-child,td:first-child,th:nth-child(2),td:nth-child(2),th:nth-child(3),td:nth-child(3),th:nth-child(6),td:nth-child(6),th:nth-child(10),td:nth-child(10){text-align:left}
.scope{font-weight:800}
.target{color:var(--accent)}
.ref{color:var(--muted)}
.hit{color:var(--ok);font-weight:800}
.miss{color:var(--accent);font-weight:800}
.pending{color:var(--warn);font-weight:800}
.tickets{min-width:96px;max-width:none;white-space:nowrap;text-align:left;line-height:1.5}
tr.hit-row td{background:#ecfdf5}
tr.miss-row td{background:#fef2f2}
tr.hit-row:hover td{background:#d1fae5}
tr.miss-row:hover td{background:#fee2e2}
@media(max-width:900px){.nav-grid,.toolbar{grid-template-columns:1fr 1fr}.cards{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:560px){.inner,main{padding-left:12px;padding-right:12px}.nav-grid,.toolbar,.cards{grid-template-columns:1fr}.card strong{font-size:19px}}
</style>
</head>
<body>
<header><div class="inner"><h1>AIメモ 3連単フォワードテスト</h1><div class="meta" id="meta">読み込み中...</div></div></header>
<main>
<section class="panel warnbox">終了済みレースも参考表示しています。投票証跡として厳密に扱うのは「検証対象」の行だけです。</section>
<section class="panel">
  <h2>表示切替</h2>
  <div class="nav-grid">
    <label>日付<select id="date-select"></select></label>
    <button id="prev-button" type="button">前日</button>
    <button id="next-button" type="button">翌日</button>
    <label>期間<select id="period-select"><option value="day">日別</option><option value="week">週別</option><option value="month">月別</option></select></label>
  </div>
  <div class="tabs" id="pattern-tabs"></div>
  <div class="note" id="pattern-note"></div>
</section>
<section class="panel">
  <h2 id="summary-title">集計</h2>
  <div class="cards" id="summary-cards"></div>
</section>
<section class="panel" id="breakdown-panel">
  <h2>日別内訳</h2>
  <div class="table" id="breakdown-table"></div>
</section>
<section class="panel">
  <h2>レース一覧</h2>
  <div class="toolbar">
    <label>範囲<select id="scope-filter"><option value="all">全R</option><option value="forward_test">検証対象</option><option value="reference">参考</option></select></label>
    <label>場<select id="venue-filter"><option value="all">全場</option></select></label>
    <label>結果<select id="status-filter"><option value="all">全て</option><option value="pending">未確定</option><option value="hit">的中</option><option value="miss">不的中</option><option value="no_selection">買い目なし</option></select></label>
    <label>並び順<select id="sort-select"><option value="time">発走順</option><option value="target">検証対象優先</option><option value="odds">最高オッズ順</option></select></label>
  </div>
  <div class="table" id="race-table"><div class="note">読み込み中...</div></div>
</section>
</main>
<script>
const MANIFEST_URL='data/ai_memo_forward/manifest.json?v=20260612-period-nav';
let MANIFEST=null;
let CACHE=new Map();
let state={date:'',period:'day',pattern:'stable_cap_500'};
function e(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function n(v){const x=Number(String(v==null?0:v).replace(/,/g,''));return Number.isFinite(x)?x:0;}
function truthy(v){return v===true||String(v).toLowerCase()==='true'||String(v)==='1';}
function yen(u){return Math.round(n(u)*100).toLocaleString('ja-JP')+'円';}
function pct(v){return (n(v)*100).toFixed(1)+'%';}
function statusLabel(s){return {hit:'的中',miss:'不的中',pending:'未確定',reference:'参考',no_selection:'買い目なし'}[s]||s;}
function parseDate(s){const p=String(s).split('-').map(Number);return new Date(Date.UTC(p[0],p[1]-1,p[2]));}
function dateText(d){return d.toISOString().slice(0,10);}
function addDays(s,days){const d=parseDate(s);d.setUTCDate(d.getUTCDate()+days);return dateText(d);}
function weekStart(s){const d=parseDate(s);const day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()-day+1);return dateText(d);}
function monthKey(s){return String(s).slice(0,7);}
function periodKey(date,period){if(period==='week')return weekStart(date);if(period==='month')return monthKey(date);return date;}
function periodLabel(){if(state.period==='week'){const start=weekStart(state.date);return start+' - '+addDays(start,6);}if(state.period==='month'){const p=monthKey(state.date).split('-');return p[0]+'年'+Number(p[1])+'月';}return state.date;}
function manifestDates(){return (MANIFEST.dates||[]).map(function(d){return d.date;}).sort();}
function periodDates(){const dates=manifestDates();if(state.period==='day')return dates.includes(state.date)?[state.date]:[];const key=periodKey(state.date,state.period);return dates.filter(function(d){return periodKey(d,state.period)===key;});}
function periodKeys(){const seen=new Set();return manifestDates().map(function(d){return periodKey(d,state.period);}).filter(function(k){if(seen.has(k))return false;seen.add(k);return true;});}
function csvParse(text){const rows=[];let row=[],field='',q=false;for(let i=0;i<text.length;i++){const c=text[i];if(q){if(c==='"'&&text[i+1]==='"'){field+='"';i++;}else if(c==='"'){q=false;}else{field+=c;}}else{if(c==='"'){q=true;}else if(c===','){row.push(field);field='';}else if(c==='\n'){row.push(field);rows.push(row);row=[];field='';}else if(c!=='\r'){field+=c;}}}if(field!==''||row.length){row.push(field);rows.push(row);}if(!rows.length)return[];if(rows[0][0])rows[0][0]=rows[0][0].replace(/^\uFEFF/,'');const head=rows.shift();return rows.filter(function(r){return r.some(Boolean);}).map(function(r){const o={};head.forEach(function(h,i){o[h]=r[i]||'';});return o;});}
async function loadDate(date){if(CACHE.has(date))return CACHE.get(date);const entry=(MANIFEST.dates||[]).find(function(d){return d.date===date;});if(!entry)return[];const res=await fetch(entry.file+'?v='+(MANIFEST.generated_at||''),{cache:'no-store'});if(!res.ok)throw new Error(date+' のデータを取得できません');const rows=csvParse(await res.text()).map(function(r){r.forward_test_target=truthy(r.forward_test_target);return r;});CACHE.set(date,rows);return rows;}
async function loadPeriodRows(){const chunks=await Promise.all(periodDates().map(loadDate));return chunks.flat();}
function formatTickets(src){const tickets=[];const text=Array.isArray(src)?src.join('|'):String(src||'');const re=/\b(\d+)\s*[-=]\s*(\d+)\s*[-=]\s*(\d+)\b/g;let m;while((m=re.exec(text))!==null){const t=[m[1],m[2],m[3]];if(new Set(t).size===3)tickets.push(t);}if(!tickets.length)return e(text||'-');const groups=new Map();for(const t of tickets){const key=t[0]+'-'+t[1];if(!groups.has(key))groups.set(key,new Set());groups.get(key).add(t[2]);}return [...groups.entries()].map(function(pair){const thirds=[...pair[1]].sort(function(a,b){return Number(a)-Number(b);}).join('');return e(pair[0]+'-'+thirds);}).join('<br>');}
function summarize(rows){const settled=rows.filter(function(r){return r.status==='hit'||r.status==='miss';});const combined=settled.filter(function(r){return n(r.combined_odds)>0;});const invested=settled.reduce(function(a,r){return a+n(r.invested_units);},0);const returned=settled.reduce(function(a,r){return a+n(r.returned_units);},0);const dutchIn=combined.reduce(function(a,r){return a+n(r.dutch_invested_units);},0);const dutchOut=combined.reduce(function(a,r){return a+n(r.dutch_returned_units);},0);const tickets=settled.reduce(function(a,r){return a+n(r.ticket_count);},0);const hits=settled.filter(function(r){return r.status==='hit';}).length;return {date_count:new Set(rows.map(function(r){return r.date;})).size,race_count:rows.length,selected_race_count:rows.filter(function(r){return r.status!=='no_selection';}).length,forward_test_race_count:rows.filter(function(r){return r.forward_test_target;}).length,reference_race_count:rows.filter(function(r){return !r.forward_test_target;}).length,settled_count:settled.length,pending_count:rows.filter(function(r){return r.status==='pending';}).length,no_selection_count:rows.filter(function(r){return r.status==='no_selection';}).length,hit_count:hits,miss_count:settled.length-hits,hit_rate:settled.length?hits/settled.length:0,ticket_count:tickets,average_ticket_count:settled.length?tickets/settled.length:0,invested_units:invested,returned_units:returned,profit_units:returned-invested,roi:invested?returned/invested:0,dutch_invested_units:dutchIn,dutch_returned_units:dutchOut,dutch_profit_units:dutchOut-dutchIn,dutch_roi:dutchIn?dutchOut/dutchIn:0,average_combined_odds:combined.length?combined.reduce(function(a,r){return a+n(r.combined_odds);},0)/combined.length:0};}
function summaryCards(s){return `<div class="card"><span>対象日数</span><strong>${s.date_count}</strong></div><div class="card"><span>表示R</span><strong>${s.race_count}</strong></div><div class="card"><span>検証対象R</span><strong>${s.forward_test_race_count}</strong></div><div class="card"><span>確定R</span><strong>${s.settled_count}</strong></div><div class="card"><span>的中率</span><strong>${pct(s.hit_rate)}</strong></div><div class="card"><span>点数</span><strong>${s.ticket_count}</strong></div><div class="card"><span>購入額</span><strong>${yen(s.invested_units)}</strong></div><div class="card"><span>払戻額</span><strong>${yen(s.returned_units)}</strong></div><div class="card"><span>ROI</span><strong>${pct(s.roi)}</strong></div><div class="card"><span>合成買いROI</span><strong>${pct(s.dutch_roi)}</strong></div><div class="card"><span>平均合成O</span><strong>${n(s.average_combined_odds).toFixed(2)}</strong></div>`;}
function updateDateSelect(){document.getElementById('date-select').innerHTML=manifestDates().map(function(d){return `<option value="${e(d)}">${e(d)}</option>`;}).join('');document.getElementById('date-select').value=state.date;}
function updateNav(){const prev=document.getElementById('prev-button'),next=document.getElementById('next-button');const labels={day:['前日','翌日'],week:['前週','翌週'],month:['前月','翌月']}[state.period];prev.textContent=labels[0];next.textContent=labels[1];if(state.period==='day'){const dates=manifestDates();const i=dates.indexOf(state.date);prev.disabled=i<=0;next.disabled=i<0||i>=dates.length-1;}else{const keys=periodKeys();const i=keys.indexOf(periodKey(state.date,state.period));prev.disabled=i<=0;next.disabled=i<0||i>=keys.length-1;}}
function movePeriod(delta){if(state.period==='day'){const dates=manifestDates();const i=dates.indexOf(state.date);if(i>=0&&dates[i+delta])state.date=dates[i+delta];}else{const keys=periodKeys();const i=keys.indexOf(periodKey(state.date,state.period));const nextKey=keys[i+delta];if(nextKey){state.date=manifestDates().find(function(d){return periodKey(d,state.period)===nextKey;})||state.date;}}updateDateSelect();renderAll();}
function patternRows(rows){return rows.filter(function(r){return r.pattern_id===state.pattern;});}
function filtered(rows){const scope=document.getElementById('scope-filter').value,venue=document.getElementById('venue-filter').value,status=document.getElementById('status-filter').value,sort=document.getElementById('sort-select').value;let out=patternRows(rows).filter(function(r){return (scope==='all'||r.selection_scope===scope)&&(venue==='all'||r.venue===venue)&&(status==='all'||r.status===status);});out.sort(function(a,b){if(sort==='target'){const d=(b.forward_test_target?1:0)-(a.forward_test_target?1:0);if(d)return d;}if(sort==='odds')return n(b.odds_max)-n(a.odds_max);return String(a.date).localeCompare(String(b.date))||String(a.scheduled_start_time).localeCompare(String(b.scheduled_start_time))||String(a.venue).localeCompare(String(b.venue),'ja')||n(a.race_number)-n(b.race_number);});return out;}
function renderBreakdown(rows){const panel=document.getElementById('breakdown-panel');if(state.period==='day'){panel.style.display='none';return;}panel.style.display='block';const dates=periodDates();const body=dates.map(function(d){const s=summarize(patternRows(rows).filter(function(r){return r.date===d;}));return `<tr><td>${e(d)}</td><td>${s.race_count}</td><td>${s.forward_test_race_count}</td><td>${s.settled_count}</td><td>${s.pending_count}</td><td>${s.hit_count}</td><td>${pct(s.hit_rate)}</td><td>${yen(s.invested_units)}</td><td>${yen(s.returned_units)}</td><td>${pct(s.roi)}</td></tr>`;}).join('');document.getElementById('breakdown-table').innerHTML=body?`<table><thead><tr><th>日付</th><th>表示R</th><th>検証対象</th><th>確定</th><th>未確定</th><th>的中</th><th>的中率</th><th>購入</th><th>払戻</th><th>ROI</th></tr></thead><tbody>${body}</tbody></table>`:'<div class="note">該当する日付がありません。</div>';}
function renderRaces(rows){const out=filtered(rows);const body=out.map(function(r){const settled=r.status==='hit'||r.status==='miss';const rowCls=r.status==='hit'?'hit-row':(r.status==='miss'?'miss-row':'');const stake=settled?n(r.ticket_count):0;const ret=settled?n(r.returned_units):0;const profit=ret-stake;const co=n(r.combined_odds);const dutchProfit=settled?n(r.dutch_profit_units):0;return `<tr class="${rowCls}"><td>${e(r.date)}</td><td>${e(r.scheduled_start_time)}</td><td>${e(r.venue)}</td><td>${e(r.race_number)}R</td><td>${e(r.class_band)}</td><td>${e(r.title)}</td><td>${e(r.race_stage)}</td><td>${e(r.bank)}m</td><td><span class="scope ${r.forward_test_target?'target':'ref'}">${r.forward_test_target?'検証対象':'参考'}</span></td><td class="tickets">${formatTickets(r.selected_tickets)}</td><td>${n(r.ticket_count)}</td><td>${r.odds_min||'-'}〜${r.odds_max||'-'}</td><td>${co?co.toFixed(2):'-'}</td><td>${n(r.estimated_hit_index).toFixed(3)}</td><td class="${e(r.status)}">${statusLabel(r.status)}</td><td>${e(r.actual_ticket||'-')}</td><td>${r.actual_payout_units?yen(r.actual_payout_units):'-'}</td><td>${settled?yen(stake):'-'}</td><td>${settled?yen(ret):'-'}</td><td>${settled?yen(profit):'-'}</td><td>${settled?yen(dutchProfit):'-'}</td></tr>`;}).join('');document.getElementById('race-table').innerHTML=body?`<table><thead><tr><th>日付</th><th>発走</th><th>場</th><th>R</th><th>級</th><th>レース</th><th>stage</th><th>bank</th><th>範囲</th><th>買い目</th><th>点</th><th>オッズ</th><th>合成O</th><th>指数</th><th>結果</th><th>実着</th><th>払戻</th><th>購入</th><th>回収</th><th>損益</th><th>合成損益</th></tr></thead><tbody>${body}</tbody></table>`:'<div class="note">該当するレースがありません。</div>';}
async function renderAll(){updateNav();document.getElementById('meta').textContent='対象: '+periodLabel()+' / 更新: '+(MANIFEST.generated_at||'');const rows=await loadPeriodRows();const current=patternRows(rows);const p=MANIFEST.patterns[state.pattern]||{};document.getElementById('pattern-note').textContent=p.description||'';document.getElementById('summary-title').textContent='集計: '+periodLabel();document.getElementById('summary-cards').innerHTML=summaryCards(summarize(current));const venues=[...new Set(rows.map(function(r){return r.venue;}).filter(Boolean))].sort(function(a,b){return a.localeCompare(b,'ja');});const currentVenue=document.getElementById('venue-filter').value;document.getElementById('venue-filter').innerHTML='<option value="all">全場</option>'+venues.map(function(v){return `<option value="${e(v)}">${e(v)}</option>`;}).join('');if(venues.includes(currentVenue))document.getElementById('venue-filter').value=currentVenue;document.querySelector('#scope-filter option[value="all"]').textContent='全'+current.length+'R';renderBreakdown(rows);renderRaces(rows);}
async function init(){const res=await fetch(MANIFEST_URL,{cache:'no-store'});MANIFEST=await res.json();const dates=manifestDates();state.date=MANIFEST.latest_date||dates[dates.length-1]||'';updateDateSelect();document.getElementById('period-select').value=state.period;document.getElementById('pattern-tabs').innerHTML=Object.entries(MANIFEST.patterns||{}).map(function(pair){const id=pair[0],p=pair[1];return `<button class="tab ${id===state.pattern?'active':''}" data-id="${e(id)}">${e(p.label)}</button>`;}).join('');document.getElementById('date-select').addEventListener('change',function(ev){state.date=ev.target.value;renderAll();});document.getElementById('period-select').addEventListener('change',function(ev){state.period=ev.target.value;renderAll();});document.getElementById('prev-button').addEventListener('click',function(){movePeriod(-1);});document.getElementById('next-button').addEventListener('click',function(){movePeriod(1);});document.getElementById('pattern-tabs').addEventListener('click',function(ev){const b=ev.target.closest('button[data-id]');if(!b)return;state.pattern=b.dataset.id;document.querySelectorAll('#pattern-tabs .tab').forEach(function(x){x.classList.toggle('active',x.dataset.id===state.pattern);});renderAll();});['scope-filter','venue-filter','status-filter','sort-select'].forEach(function(id){document.getElementById(id).addEventListener('change',function(){loadPeriodRows().then(renderRaces);});});await renderAll();}
init().catch(function(err){document.getElementById('race-table').innerHTML='<div class="note">データの読み込みに失敗しました: '+e(err.message)+'</div>';});
</script>
</body>
</html>
